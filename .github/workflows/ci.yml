name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  PDFIUM_DYNAMIC_LIB_PATH: ${{ github.workspace }}/vendor/pdfium/lib

jobs:
  test:
    name: Build & test
    runs-on: ubuntu-24.04
    # Run inside an Arch container — Ubuntu 24.04 ships glib 2.80 but
    # our `gnome_50` GTK feature stack needs glib >= 2.87. Arch is
    # rolling so it tracks the GTK4 / libadwaita versions we develop
    # against.
    container:
      image: archlinux:latest
    steps:
      - name: Install system deps
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed \
            base-devel \
            git \
            rustup \
            gtk4 \
            libadwaita \
            libheif \
            x265 \
            xorg-server-xvfb \
            dbus \
            pkgconf \
            curl

      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup default stable
          rustup component add rustfmt clippy

      - uses: Swatinem/rust-cache@v2

      - name: Cache pdfium binary
        id: pdfium-cache
        uses: actions/cache@v4
        with:
          path: vendor/pdfium
          key: pdfium-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('scripts/fetch-pdfium.sh') }}

      - name: Fetch pdfium
        if: steps.pdfium-cache.outputs.cache-hit != 'true'
        run: ./scripts/fetch-pdfium.sh

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: cargo test (headless)
        run: xvfb-run -a dbus-run-session -- cargo test --workspace --all-features

      - name: cargo build (release smoke)
        run: cargo build --workspace --release
