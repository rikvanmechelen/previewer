name: Release

# Builds a .deb and a distro-agnostic AppImage on every `vX.Y.Z` tag
# push and uploads them to the GitHub Release that the tag implicitly
# creates.
#
# Usage:
#   1. Bump `version` in workspace `Cargo.toml`.
#   2. `git tag v0.1.0 && git push --tags`.
#   3. Watch the workflow run; the Release will appear with assets
#      attached at https://github.com/<owner>/previewer/releases.

on:
  push:
    tags: ['v*.*.*', 'v*.*.*-*']
  # Manual fallback so a maintainer can re-run a build for an existing
  # tag (e.g. after fixing CI) without having to delete and re-push.
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.0)"
        required: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  PDFIUM_DYNAMIC_LIB_PATH: ${{ github.workspace }}/vendor/pdfium/lib
  # AppImage tooling on container runners can't FUSE-mount itself —
  # extract-and-run sidesteps that, with a small startup-time cost.
  APPIMAGE_EXTRACT_AND_RUN: "1"

jobs:
  build:
    name: Build .deb + AppImage
    runs-on: ubuntu-24.04
    # Build inside Arch — Ubuntu 24.04 has glib 2.80; the gnome_50
    # feature in our gtk4-rs stack needs glib >= 2.87. Arch tracks the
    # bleeding edge.
    container:
      image: archlinux:latest
    permissions:
      contents: write   # needed for action-gh-release upload

    steps:
      - name: Install build deps
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed \
            base-devel \
            git \
            rustup \
            gtk4 \
            libadwaita \
            libheif \
            x265 \
            pkgconf \
            curl \
            wget \
            file \
            desktop-file-utils \
            librsvg \
            squashfs-tools \
            zsync \
            dpkg \
            fakeroot \
            gdk-pixbuf2 \
            shared-mime-info \
            adwaita-icon-theme \
            hicolor-icon-theme \
            gsettings-desktop-schemas \
            dconf \
            gobject-introspection

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust toolchain
        run: rustup default stable

      - uses: Swatinem/rust-cache@v2

      - name: Cache pdfium binary
        id: pdfium-cache
        uses: actions/cache@v4
        with:
          path: vendor/pdfium
          key: pdfium-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('scripts/fetch-pdfium.sh') }}

      - name: Fetch pdfium
        if: steps.pdfium-cache.outputs.cache-hit != 'true'
        run: ./scripts/fetch-pdfium.sh

      - name: Build release binary
        run: cargo build --workspace --release

      # ──────────────────────── .deb ────────────────────────
      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build .deb
        run: cargo deb -p previewer-app --no-strip --no-build

      # ────────────────────── AppImage ──────────────────────
      - name: Stage AppDir
        run: |
          set -eux
          APPDIR="$PWD/AppDir"
          rm -rf "$APPDIR"
          mkdir -p "$APPDIR/usr/bin"
          mkdir -p "$APPDIR/usr/lib"
          mkdir -p "$APPDIR/usr/share/applications"
          mkdir -p "$APPDIR/usr/share/icons/hicolor/scalable/apps"
          mkdir -p "$APPDIR/usr/share/icons/hicolor/scalable/actions"

          install -Dm755 target/release/previewer "$APPDIR/usr/bin/previewer"

          # Place libpdfium.so directly under usr/lib/ so linuxdeploy's
          # default LD_LIBRARY_PATH ($APPDIR/usr/lib) catches it via
          # the bare-name fallback in `resolve_pdfium_path`.
          install -Dm644 vendor/pdfium/lib/libpdfium.so "$APPDIR/usr/lib/libpdfium.so"

          install -Dm644 data/org.moma.Previewer.desktop \
            "$APPDIR/usr/share/applications/org.moma.Previewer.desktop"
          install -Dm644 data/icons/hicolor/scalable/apps/org.moma.Previewer.svg \
            "$APPDIR/usr/share/icons/hicolor/scalable/apps/org.moma.Previewer.svg"
          for svg in data/icons/hicolor/scalable/actions/*.svg; do
            install -Dm644 "$svg" "$APPDIR/usr/share/icons/hicolor/scalable/actions/$(basename "$svg")"
          done

      - name: Fetch linuxdeploy
        run: |
          curl -L -o linuxdeploy-x86_64.AppImage \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage

      - name: Bundle gdk-pixbuf loaders manually
        # We dropped linuxdeploy-plugin-gtk because it was fragile against
        # modern Arch (kept hard-failing on missing /usr/lib/gtk-4.0,
        # then on empty pkg-config variables for gdk-pixbuf2). Manually
        # copy the bits we actually need: the SVG/PNG pixbuf loaders so
        # GTK can decode our action icons at runtime, plus the
        # Adwaita icon theme. Anything else (gschemas, GIR typelibs,
        # gtk-4.0 modules) Previewer doesn't use.
        run: |
          set -eux
          # gdk-pixbuf loader dir + loaders.cache. Use pkg-config in
          # case the version path moves; resolve at build time.
          PIXBUF_DIR="$(pkg-config --variable=gdk_pixbuf_binarydir gdk-pixbuf-2.0)"
          if [ -n "$PIXBUF_DIR" ] && [ -d "$PIXBUF_DIR" ]; then
              mkdir -p "AppDir$PIXBUF_DIR"
              cp -r "$PIXBUF_DIR"/* "AppDir$PIXBUF_DIR/" || true
              # Regenerate the cache file relative to the AppDir so the
              # AppImage finds its bundled loaders.
              GDK_PIXBUF_MODULEDIR="$PIXBUF_DIR/loaders" \
                gdk-pixbuf-query-loaders > "AppDir$PIXBUF_DIR/loaders.cache" || true
          fi
          # Adwaita icon theme — small enough to bundle, makes the
          # AppImage self-contained on hosts without it installed.
          if [ -d /usr/share/icons/Adwaita ]; then
              mkdir -p AppDir/usr/share/icons
              cp -r /usr/share/icons/Adwaita AppDir/usr/share/icons/
          fi
          if [ -d /usr/share/icons/hicolor ]; then
              mkdir -p AppDir/usr/share/icons
              cp -r /usr/share/icons/hicolor AppDir/usr/share/icons/ 2>/dev/null || true
          fi

      - name: Build AppImage
        env:
          VERSION: ${{ github.event.inputs.tag || github.ref_name }}
          # linuxdeploy ships an older `strip` that doesn't understand
          # the SHT_RELR (`.relr.dyn`) ELF section the bundled Arch
          # libraries use. Skip stripping entirely — the AppImage is
          # ~30% larger but actually builds.
          NO_STRIP: "true"
        run: |
          set -eux
          # No --plugin gtk — see the manual gdk-pixbuf bundling step
          # above. linuxdeploy alone bundles libgtk-4.so.1, libadwaita
          # and their NEEDED transitive deps from /usr/lib, which is
          # what we actually want.
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --desktop-file AppDir/usr/share/applications/org.moma.Previewer.desktop \
            --icon-file data/icons/hicolor/scalable/apps/org.moma.Previewer.svg \
            --output appimage
          ls -la *.AppImage

      # ────────────────── Collect & checksum ────────────────
      - name: Collect artifacts + checksums
        run: |
          set -eux
          mkdir -p dist
          cp target/debian/*.deb dist/
          # Only the Previewer AppImage — `linuxdeploy-x86_64.AppImage`
          # is the build tool, not a release artefact.
          cp Previewer-*.AppImage dist/
          (cd dist && sha256sum * > SHA256SUMS)
          ls -la dist

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            dist/*.deb
            dist/*.AppImage
            dist/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true
