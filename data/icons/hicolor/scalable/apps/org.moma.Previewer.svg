<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5093EA"/>
      <stop offset="1" stop-color="#2A5BC9"/>
    </linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFD89B"/>
      <stop offset="1" stop-color="#FF8C69"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0" stop-color="#4A4A4A"/>
      <stop offset="1" stop-color="#1C1C1C"/>
    </linearGradient>
    <radialGradient id="glass" cx="0.3" cy="0.25" r="0.85">
      <stop offset="0" stop-color="white" stop-opacity="0.5"/>
      <stop offset="0.6" stop-color="white" stop-opacity="0.08"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="handle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5A5A5A"/>
      <stop offset="1" stop-color="#222"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Tilted photo card -->
  <g transform="translate(246 240) rotate(-7) translate(-160 -160)">
    <!-- Drop shadow -->
    <rect x="8" y="14" width="320" height="320" rx="14" fill="rgba(0,0,0,0.28)"/>
    <!-- Card -->
    <rect width="320" height="320" rx="14" fill="#FAFAFA"/>
    <!-- Photo: sky -->
    <rect x="20" y="20" width="280" height="180" fill="url(#sky)"/>
    <!-- Sun -->
    <circle cx="232" cy="72" r="22" fill="#FFD740"/>
    <!-- Far mountain -->
    <path d="M 20 200 L 70 130 L 130 170 L 180 110 L 240 155 L 290 130 L 300 145 L 300 200 Z" fill="#6B85B5"/>
    <!-- Near mountain -->
    <path d="M 20 200 L 50 170 L 100 150 L 145 175 L 200 145 L 245 168 L 295 155 L 300 158 L 300 200 Z" fill="#3D5A89"/>
    <!-- Photo border -->
    <rect x="20" y="20" width="280" height="180" fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="1"/>
    <!-- Caption / document lines -->
    <rect x="20" y="220" width="280" height="6" rx="3" fill="#DDD"/>
    <rect x="20" y="236" width="240" height="6" rx="3" fill="#DDD"/>
    <rect x="20" y="252" width="260" height="6" rx="3" fill="#DDD"/>
    <rect x="20" y="268" width="180" height="6" rx="3" fill="#DDD"/>
    <rect x="20" y="284" width="220" height="6" rx="3" fill="#DDD"/>
  </g>

  <!-- Magnifying glass -->
  <g transform="translate(348 332)">
    <!-- Handle (drawn first so the ring overlaps it cleanly) -->
    <g transform="rotate(45)">
      <rect x="78" y="-13" width="110" height="26" rx="13" fill="url(#handle)"/>
      <rect x="82" y="-9" width="100" height="3" rx="1.5" fill="rgba(255,255,255,0.25)"/>
    </g>
    <!-- Outer ring -->
    <circle r="96" fill="url(#ring)"/>
    <!-- Inner glass tint -->
    <circle r="78" fill="#A8D5E8" opacity="0.7"/>
    <!-- Glass radial sheen -->
    <circle r="78" fill="url(#glass)"/>
    <!-- Specular highlight -->
    <ellipse cx="-32" cy="-32" rx="30" ry="14" fill="white" opacity="0.6" transform="rotate(-35)"/>
    <!-- Subtle inner ring shadow -->
    <circle r="78" fill="none" stroke="rgba(0,0,0,0.15)" stroke-width="2"/>
  </g>
</svg>
